replicaCounts:
  api: 1
  agents: 1

image:
  repository: example/clinicaltrial-ai
  tag: dev

env:
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  # Kubernetes Secret name; must contain key `password`
  neo4jSecretName: "neo4j-auth"

api:
  port: 8000
  service:
    type: ClusterIP
    port: 80

env:
  USE_LANGGRAPH: "true"
  OTEL_ENABLE: "true"
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  neo4jSecretName: "neo4j-auth"
