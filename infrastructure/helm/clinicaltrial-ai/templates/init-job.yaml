apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "clinicaltrial-ai.fullname" . }}-init
  labels:
    app.kubernetes.io/name: {{ include "clinicaltrial-ai.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc", "python scripts/setup_graph.py && python scripts/load_omop.py"]
          env:
            - name: NEO4J_URI
              value: {{ .Values.env.NEO4J_URI | quote }}
            - name: NEO4J_USER
              value: {{ .Values.env.NEO4J_USER | quote }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-neo4j" (include "clinicaltrial-ai.fullname" .)) .Values.env.neo4jSecretName }}
                  key: password
