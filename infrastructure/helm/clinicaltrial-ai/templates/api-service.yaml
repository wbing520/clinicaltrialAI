apiVersion: v1
kind: Service
metadata:
  name: {{ include "clinicaltrial-ai.fullname" . }}-api
  labels:
    app.kubernetes.io/name: {{ include "clinicaltrial-ai.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.api.service.port | default 80 }}
      targetPort: {{ .Values.api.port | default 8000 }}
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "clinicaltrial-ai.name" . }}
    app.kubernetes.io/component: api
