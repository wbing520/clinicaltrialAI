apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clinicaltrial-ai.fullname" . }}-api
  labels:
    app.kubernetes.io/name: {{ include "clinicaltrial-ai.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCounts.api | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "clinicaltrial-ai.name" . }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "clinicaltrial-ai.name" . }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: {{ .Values.api.port | default 8000 | quote }}
            - name: USE_LANGGRAPH
              value: {{ .Values.env.USE_LANGGRAPH | default "true" | quote }}
            - name: OTEL_ENABLE
              value: {{ .Values.env.OTEL_ENABLE | default "true" | quote }}
            - name: NEO4J_URI
              value: {{ .Values.env.NEO4J_URI | quote }}
            - name: NEO4J_USER
              value: {{ .Values.env.NEO4J_USER | quote }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-neo4j" (include "clinicaltrial-ai.fullname" .)) .Values.env.neo4jSecretName }}
                  key: password
          ports:
            - containerPort: {{ .Values.api.port | default 8000 }}
              name: http
          command: ["uvicorn"]
          args: ["src.api.app:app", "--host", "0.0.0.0", "--port", "$(PORT)"]
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /simulate/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
